<!DOCTYPE html>
<html>
<head>
  <title>Snake Game</title>
  <style>
    body { text-align:center; font-family:Arial; }
    canvas { background: #eee; display:block; margin: 0 auto; }
  </style>
</head>
<body>
  <h1>Snake Game</h1>
  <canvas id="game" width="400" height="400"></canvas>
  <p>Score: <span id="score">0</span></p>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const box = 20;
    const canvasSize = 400;

    let snake = [{x: 200, y: 200}];
    let food = {x: Math.floor(Math.random()*20)*box, y: Math.floor(Math.random()*20)*box};
    let dx = box;
    let dy = 0;
    let score = 0;

    document.addEventListener('keydown', direction);

    function direction(e) {
      if(e.key === 'ArrowUp' && dy === 0){ dx=0; dy=-box; }
      else if(e.key === 'ArrowDown' && dy === 0){ dx=0; dy=box; }
      else if(e.key === 'ArrowLeft' && dx === 0){ dx=-box; dy=0; }
      else if(e.key === 'ArrowRight' && dx === 0){ dx=box; dy=0; }
    }

    function collision(head, array){
      for(let i=0; i<array.length; i++){
        if(head.x === array[i].x && head.y === array[i].y) return true;
      }
      return false;
    }

    function draw() {
      ctx.clearRect(0,0,canvasSize,canvasSize);

      // Draw snake
      for(let i=0; i<snake.length; i++){
        ctx.fillStyle = i===0 ? 'green' : 'lime';
        ctx.fillRect(snake[i].x, snake[i].y, box, box);
        ctx.strokeRect(snake[i].x, snake[i].y, box, box);
      }

      // Draw food
      ctx.fillStyle = 'red';
      ctx.fillRect(food.x, food.y, box, box);

      // Move snake
      let head = {x: snake[0].x + dx, y: snake[0].y + dy};

      // Eat food
      if(head.x === food.x && head.y === food.y){
        score++;
        document.getElementById('score').innerText = score;
        food = {x: Math.floor(Math.random()*20)*box, y: Math.floor(Math.random()*20)*box};
      } else {
        snake.pop();
      }

      // Game over
      if(head.x < 0 || head.x >= canvasSize || head.y < 0 || head.y >= canvasSize || collision(head, snake)){
        alert('Game Over! Score: ' + score);
        snake = [{x:200,y:200}]; dx=box; dy=0; score=0;
        document.getElementById('score').innerText = score;
        food = {x: Math.floor(Math.random()*20)*box, y: Math.floor(Math.random()*20)*box};
      }

      snake.unshift(head);
    }

    setInterval(draw, 150); // game speed
  </script>
</body>
</html>
