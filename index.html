<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic-Tac-Toe vs Computer</title>
<style>
    body { font-family: Arial; text-align: center; background-color: #f0f2f5; }
    h1 { color: #4CAF50; }
    .board { display: grid; grid-template-columns: repeat(3, 100px); grid-gap: 5px; justify-content: center; margin-top: 20px; }
    .cell { width: 100px; height: 100px; background-color: white; border: 2px solid #4CAF50; font-size: 2.5rem; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .cell:hover { background-color: #e0f7e0; }
    button { margin-top: 20px; padding: 10px 20px; font-size: 1rem; cursor: pointer; }
</style>
</head>
<body>
<h1>Tic-Tac-Toe vs Computer</h1>
<div class="board" id="board">
    <div class="cell" data-index="0"></div>
    <div class="cell" data-index="1"></div>
    <div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div>
    <div class="cell" data-index="4"></div>
    <div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div>
    <div class="cell" data-index="7"></div>
    <div class="cell" data-index="8"></div>
</div>
<button onclick="resetGame()">Restart Game</button>

<script>
const cells = document.querySelectorAll('.cell');
let gameState = ["", "", "", "", "", "", "", "", ""];
let currentPlayer = "X"; // X = player, O = computer
const winCombos = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

function handleClick(e) {
    const index = e.target.dataset.index;
    if(gameState[index] !== "" || checkWinner()) return;

    // Player move
    gameState[index] = "X";
    e.target.textContent = "X";

    if(checkWinner()) { 
        setTimeout(() => alert("You win! 🎉"), 100); 
        return; 
    } 
    else if(gameState.every(cell => cell !== "")) {
        setTimeout(() => alert("It's a tie! 🤝"), 100);
        return;
    }

    // Computer move
    setTimeout(computerMove, 300);
}

function computerMove() {
    const emptyCells = gameState.map((val,i) => val === "" ? i : null).filter(v => v !== null);
    if(emptyCells.length === 0) return;
    const move = emptyCells[Math.floor(Math.random() * emptyCells.length)];
    gameState[move] = "O";
    cells[move].textContent = "O";

    if(checkWinner()) {
        setTimeout(() => alert("Computer wins! 💻"), 100);
    }
}

function checkWinner() {
    return winCombos.some(combo => {
        return combo.every(i => gameState[i] === currentPlayer);
    });
}

function resetGame() {
    gameState = ["", "", "", "", "", "", "", "", ""];
    cells.forEach(cell => cell.textContent = "");
    currentPlayer = "X";
}

cells.forEach(cell => cell.addEventListener('click', handleClick));
</script>
</body>
</html>
